
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymTrack Pro Elite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pine: '#064e3b',
                        mint: '#2dd4bf',
                        dark: '#0a0a0a',
                        gold: '#fbbf24',
                        ruby: '#f43f5e',
                        sky: '#0ea5e9',
                        lime: '#84cc16',
                        violet: '#8b5cf6'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #060606;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .tab-active { color: #2dd4bf; border-bottom: 3px solid #2dd4bf; }
        .muscle-btn-active { 
            background: linear-gradient(135deg, #2dd4bf, #0ea5e9) !important; 
            color: #064e3b !important; 
            font-weight: 800;
        }
        .achievement-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            transition: all 0.3s ease;
        }
        .achievement-unlocked {
            border: 1px solid rgba(45, 212, 191, 0.3);
            box-shadow: 0 10px 30px -10px rgba(45, 212, 191, 0.2);
        }
        .calendar-day { 
            aspect-ratio: 1; 
            border-radius: 6px; 
            background: rgba(255,255,255,0.05); 
            transition: transform 0.2s;
        }
        .cal-Pecho { background: #f43f5e; box-shadow: 0 0 10px rgba(244,63,94,0.3); }
        .cal-Espalda { background: #0ea5e9; box-shadow: 0 0 10px rgba(14,165,233,0.3); }
        .cal-Pierna { background: #84cc16; box-shadow: 0 0 10px rgba(132,204,22,0.3); }
        .cal-Hombro { background: #f97316; box-shadow: 0 0 10px rgba(249,115,22,0.3); }
        .cal-Brazos { background: #a855f7; box-shadow: 0 0 10px rgba(168,85,247,0.3); }
        .cal-Abdomen { background: #2dd4bf; box-shadow: 0 0 10px rgba(45,212,191,0.3); }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header -->
    <header class="p-6 pt-10 sticky top-0 bg-[#060606]/90 backdrop-blur-xl z-40 border-b border-white/5">
        <div class="max-w-xl mx-auto flex justify-between items-start mb-6">
            <div>
                <h1 class="text-2xl font-black uppercase italic tracking-tighter">Gym<span class="text-mint text-shadow-glow">Elite</span></h1>
                <div class="flex gap-2 mt-2">
                    <select id="month-select" onchange="handleDateChange()" class="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-[10px] font-bold uppercase outline-none cursor-pointer">
                        <option value="0">Enero</option><option value="1">Febrero</option><option value="2">Marzo</option>
                        <option value="3">Abril</option><option value="4">Mayo</option><option value="5">Junio</option>
                        <option value="6">Julio</option><option value="7">Agosto</option><option value="8">Septiembre</option>
                        <option value="9">Octubre</option><option value="10">Noviembre</option><option value="11">Diciembre</option>
                    </select>
                    <select id="year-select" onchange="handleDateChange()" class="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-[10px] font-bold uppercase outline-none cursor-pointer"></select>
                </div>
            </div>
            <div id="total-xp" class="px-4 py-2 rounded-xl bg-mint/10 border border-mint/20 text-[10px] font-black text-mint uppercase tracking-widest shadow-[0_0_15px_rgba(45,212,191,0.1)]">0 XP</div>
        </div>

        <nav class="max-w-xl mx-auto flex justify-between gap-4">
            <button onclick="switchTab('workout')" id="tab-workout" class="pb-2 text-[10px] font-black uppercase tracking-widest tab-active">Entrenar</button>
            <button onclick="switchTab('metrics')" id="tab-metrics" class="pb-2 text-[10px] font-black uppercase tracking-widest text-white/30">Métricas</button>
            <button onclick="switchTab('history')" id="tab-history" class="pb-2 text-[10px] font-black uppercase tracking-widest text-white/30">Historial</button>
            <button onclick="switchTab('achievements')" id="tab-achievements" class="pb-2 text-[10px] font-black uppercase tracking-widest text-white/30">Logros</button>
        </nav>
    </header>

    <main class="max-w-xl mx-auto p-6">
        
        <!-- Tab: Entrenar -->
        <section id="content-workout" class="space-y-6">
            <div id="muscle-card" class="glass-card p-6 rounded-[2rem]">
                <h3 class="text-[10px] font-black uppercase mb-4 text-white/40 tracking-widest text-center">Selecciona Músculo</h3>
                <div id="muscle-selector" class="grid grid-cols-3 gap-2"></div>
            </div>

            <div id="workout-area" class="hidden space-y-6">
                <!-- Seccion de Rutinas Guardadas -->
                <div id="saved-routines-section" class="space-y-3 hidden">
                    <h3 class="text-[9px] font-black uppercase text-white/30 tracking-[0.2em] ml-2">Rutinas Guardadas</h3>
                    <div id="saved-routines-list" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                        <!-- Chips de ejercicios guardados se insertan aquí -->
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-4 rounded-2xl text-center border-white/5">
                        <span class="text-[8px] font-black text-white/30 uppercase block mb-1">Duración Sesión</span>
                        <span id="session-timer" class="text-xl font-mono font-bold">00:00:00</span>
                    </div>
                    <div class="glass-card p-4 rounded-2xl text-center border-mint/10">
                        <span class="text-[8px] font-black text-mint/40 uppercase block mb-1">Bajo Tensión</span>
                        <span id="productive-timer" class="text-xl font-mono font-bold text-mint">00:00:00</span>
                    </div>
                </div>

                <button onclick="openModal()" class="w-full p-5 rounded-3xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-colors">+ Añadir Ejercicio</button>

                <div id="exercise-list" class="space-y-3"></div>

                <button id="btn-finish" class="w-full py-5 rounded-[2rem] bg-mint text-pine font-black text-sm uppercase opacity-50 cursor-not-allowed shadow-[0_10px_30px_rgba(45,212,191,0.2)]" disabled onclick="finishWorkout()">Finalizar Sesión</button>
            </div>
        </section>

        <!-- Tab: Métricas -->
        <section id="content-metrics" class="hidden space-y-6">
            <div class="glass-card p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black uppercase text-[10px] tracking-widest text-mint">Mapa de Consistencia</h3>
                    <div class="flex gap-1">
                        <div class="w-2 h-2 rounded-sm bg-white/5"></div>
                        <div class="w-2 h-2 rounded-sm bg-mint/40"></div>
                        <div class="w-2 h-2 rounded-sm bg-mint"></div>
                    </div>
                </div>
                <div id="calendar-container" class="grid grid-cols-7 gap-2"></div>
            </div>
            
            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="font-black uppercase text-[10px] tracking-widest text-white/60 mb-6 text-center">Distribución de Volumen (lb)</h3>
                <canvas id="volumeChart" class="max-h-64"></canvas>
            </div>

            <div class="glass-card p-6 rounded-[2rem]">
                <h3 class="font-black uppercase text-[10px] tracking-widest text-white/60 mb-6 text-center">Frecuencia por Músculo</h3>
                <div id="weekly-frequency" class="space-y-5"></div>
            </div>
        </section>

        <!-- Tab: Historial -->
        <section id="content-history" class="hidden space-y-4">
            <div id="history-container" class="space-y-4"></div>
        </section>

        <!-- Tab: Logros -->
        <section id="content-achievements" class="hidden space-y-6">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-black uppercase italic">Galería de Trofeos</h2>
                <span id="ach-count" class="text-[10px] font-bold text-mint">0/30</span>
            </div>
            <div id="achievements-container" class="grid grid-cols-2 gap-4"></div>
        </section>

    </main>

    <!-- Modal Form -->
    <div id="modal" class="fixed inset-0 z-50 bg-black/95 hidden flex items-center justify-center p-6 backdrop-blur-2xl">
        <form id="exercise-form" onsubmit="event.preventDefault(); addExercise();" class="glass-card w-full max-w-sm p-8 rounded-[3rem] border-white/20">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black uppercase italic tracking-tighter">Nuevo Ejercicio</h3>
                <button type="button" onclick="closeModal()" class="text-white/20 hover:text-white font-bold">✕</button>
            </div>
            <div class="space-y-5">
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase text-white/30 ml-2">Nombre del ejercicio</label>
                    <input type="text" id="ex-name" required placeholder="Ej: Press Militar" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none focus:border-mint/50 transition-colors">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] font-black uppercase text-white/30 ml-2">Peso actual (lb)</label>
                    <input type="number" id="ex-weight" step="0.5" required placeholder="0.0" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none focus:border-mint/50 transition-colors">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase text-white/30 ml-2">Series (1-10)</label>
                        <input type="number" id="ex-sets" required min="1" max="10" placeholder="4" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none focus:border-mint/50 transition-colors">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black uppercase text-white/30 ml-2">Reps (1-30)</label>
                        <input type="number" id="ex-reps" required min="1" max="30" placeholder="12" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none focus:border-mint/50 transition-colors">
                    </div>
                </div>
                <button type="submit" class="w-full py-5 bg-mint rounded-2xl text-pine font-black text-xs uppercase shadow-[0_10px_20px_rgba(45,212,191,0.2)] mt-4">Añadir al Plan</button>
            </div>
        </form>
    </div>

    <script>
        const MUSCLES = ['Pecho', 'Espalda', 'Pierna', 'Hombro', 'Brazos', 'Abdomen'];
        
        const ACHIEVEMENTS = [
            { id: 1, title: 'Primer Paso', desc: '1 entrenamiento', goal: 1, type: 'count', icon: '🚀', color: 'from-mint to-sky' },
            { id: 2, title: 'Novato Pro', desc: '5 entrenamientos', goal: 5, type: 'count', icon: '🔰', color: 'from-lime to-mint' },
            { id: 3, title: 'Habituado', desc: '10 entrenamientos', goal: 10, type: 'count', icon: '📅', color: 'from-sky to-violet' },
            { id: 4, title: 'Atleta', desc: '25 entrenamientos', goal: 25, type: 'count', icon: '🏃', color: 'from-orange-400 to-red-500' },
            { id: 5, title: 'Leyenda Local', desc: '50 entrenamientos', goal: 50, type: 'count', icon: '🏆', color: 'from-yellow-400 to-orange-600' },
            { id: 6, title: 'Dios del Gym', desc: '100 entrenamientos', goal: 100, type: 'count', icon: '⚡', color: 'from-purple-500 to-pink-500' },
            { id: 7, title: 'Fuerza Inicial', desc: '1,000lb movidas', goal: 1000, type: 'volume', icon: '⚖️', color: 'from-slate-400 to-slate-600' },
            { id: 8, title: 'Tonelada', desc: '2,000lb movidas', goal: 2000, type: 'volume', icon: '📦', color: 'from-blue-400 to-indigo-600' },
            { id: 9, title: 'Levantador', desc: '5,000lb movidas', goal: 5000, type: 'volume', icon: '🏗️', color: 'from-emerald-400 to-teal-600' },
            { id: 10, title: 'Hércules', desc: '10,000lb movidas', goal: 10000, type: 'volume', icon: '💪', color: 'from-amber-400 to-yellow-600' },
            { id: 11, title: 'Titan', desc: '25,000lb movidas', goal: 25000, type: 'volume', icon: '🧱', color: 'from-red-500 to-rose-700' },
            { id: 12, title: 'Coloso', desc: '50,000lb movidas', goal: 50000, type: 'volume', icon: '🌋', color: 'from-gray-700 to-black' },
            { id: 13, title: 'Minutos Oro', desc: '1h de TBT', goal: 3600, type: 'activeTime', icon: '⏳', color: 'from-cyan-400 to-blue-500' },
            { id: 14, title: 'Concentrado', desc: '5h de TBT', goal: 18000, type: 'activeTime', icon: '🎯', color: 'from-indigo-400 to-purple-600' },
            { id: 15, title: 'Maestro Tiempo', desc: '10h de TBT', goal: 36000, type: 'activeTime', icon: '🌀', color: 'from-fuchsia-500 to-purple-800' },
            { id: 16, title: 'Semana Perfecta', desc: '4 sesiones en un mes', goal: 4, type: 'monthly', icon: '✨', color: 'from-mint to-emerald-600' },
            { id: 17, title: 'Consistente', desc: '8 sesiones en un mes', goal: 8, type: 'monthly', icon: '🔗', color: 'from-sky to-blue-700' },
            { id: 18, title: 'Imparable', desc: '12 sesiones en un mes', goal: 12, type: 'monthly', icon: '🔥', color: 'from-orange-500 to-red-600' },
            { id: 19, title: 'Pecho Acero', desc: '10 sesiones Pecho', goal: 10, type: 'muscle_Pecho', icon: '🛡️', color: 'from-red-400 to-red-600' },
            { id: 20, title: 'Espalda Ancha', desc: '10 sesiones Espalda', goal: 10, type: 'muscle_Espalda', icon: '🦅', color: 'from-blue-400 to-blue-600' },
            { id: 21, title: 'Pilar Fuerte', desc: '10 sesiones Pierna', goal: 10, type: 'muscle_Pierna', icon: '🏛️', color: 'from-green-400 to-green-600' },
            { id: 22, title: 'Hombro Bala', desc: '10 sesiones Hombro', goal: 10, type: 'muscle_Hombro', icon: '💣', color: 'from-orange-400 to-orange-600' },
            { id: 23, title: 'Brazo Power', desc: '10 sesiones Brazos', goal: 10, type: 'muscle_Brazos', icon: '🦾', color: 'from-purple-400 to-purple-600' },
            { id: 24, title: 'Core King', desc: '10 sesiones Abdomen', goal: 10, type: 'muscle_Abdomen', icon: '💎', color: 'from-teal-400 to-teal-600' },
            { id: 25, title: 'Sesión Épica', desc: '2,000lb en una sesión', goal: 2000, type: 'single_volume', icon: '🌟', color: 'from-yellow-300 to-yellow-500' },
            { id: 26, title: 'Sesión Elite', desc: '5,000lb en una sesión', goal: 5000, type: 'single_volume', icon: '👑', color: 'from-amber-400 to-orange-500' },
            { id: 27, title: 'Maratonista', desc: 'Sesión de 90 min', goal: 5400, type: 'single_time', icon: '🕙', color: 'from-slate-500 to-slate-800' },
            { id: 28, title: 'Dedicado', desc: '5 ejercicios en una sesión', goal: 5, type: 'single_ex_count', icon: '📝', color: 'from-sky-300 to-sky-500' },
            { id: 29, title: 'Multifacético', desc: 'Entrena todos los músculos', goal: 6, type: 'all_muscles', icon: '🌈', color: 'from-pink-400 to-violet-500' },
            { id: 30, title: 'Inmortal', desc: '500,000lb totales', goal: 500000, type: 'volume', icon: '🌌', color: 'from-indigo-900 to-black' }
        ];

        let state = {
            workouts: JSON.parse(localStorage.getItem('gym_pro_data_v2')) || [],
            routines: JSON.parse(localStorage.getItem('gym_pro_routines_v2')) || {}, // Memoria de ejercicios por músculo
            current: { muscle: null, exercises: [], sessionSeconds: 0, productiveSeconds: 0, isStarted: false },
            xp: parseInt(localStorage.getItem('gym_pro_xp_v2')) || 0,
            viewMonth: new Date().getMonth(),
            viewYear: new Date().getFullYear(),
            activeTab: 'workout'
        };

        let sessionInt, exInt, myChart;

        function save() {
            localStorage.setItem('gym_pro_data_v2', JSON.stringify(state.workouts));
            localStorage.setItem('gym_pro_routines_v2', JSON.stringify(state.routines));
            localStorage.setItem('gym_pro_xp_v2', state.xp);
            document.getElementById('total-xp').innerText = `${state.xp.toLocaleString()} XP`;
        }

        function formatTime(s) {
            const h = Math.floor(s/3600).toString().padStart(2,'0');
            const m = Math.floor((s%3600)/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            return `${h}:${m}:${sec}`;
        }

        function handleDateChange() {
            state.viewMonth = parseInt(document.getElementById('month-select').value);
            state.viewYear = parseInt(document.getElementById('year-select').value);
            refreshUI();
        }

        function switchTab(id) {
            state.activeTab = id;
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`content-${id}`).classList.remove('hidden');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('tab-active', 'text-white/30'));
            document.getElementById(`tab-${id}`).classList.replace('text-white/30', 'tab-active');
            refreshUI();
        }

        function selectMuscle(m) {
            state.current.muscle = m;
            document.querySelectorAll('#muscle-selector button').forEach(b => b.classList.remove('muscle-btn-active'));
            document.getElementById(`btn-${m}`).classList.add('muscle-btn-active');
            document.getElementById('workout-area').classList.remove('hidden');
            renderSavedRoutines();
        }

        function renderSavedRoutines() {
            const section = document.getElementById('saved-routines-section');
            const container = document.getElementById('saved-routines-list');
            const saved = state.routines[state.current.muscle] || [];

            if(saved.length > 0) {
                section.classList.remove('hidden');
                container.innerHTML = saved.map(ex => `
                    <button onclick="loadRoutineExercise('${ex.name}', ${ex.sets}, ${ex.reps})" 
                        class="flex-shrink-0 px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-left min-w-[120px] active:scale-95 transition-transform">
                        <div class="text-[9px] font-black uppercase text-mint truncate w-full mb-1">${ex.name}</div>
                        <div class="text-[7px] font-bold text-white/30 uppercase tracking-widest">${ex.sets} Series · ${ex.reps} Reps</div>
                    </button>
                `).join('');
            } else {
                section.classList.add('hidden');
            }
        }

        function loadRoutineExercise(name, sets, reps) {
            document.getElementById('ex-name').value = name;
            document.getElementById('ex-sets').value = sets;
            document.getElementById('ex-reps').value = reps;
            document.getElementById('ex-weight').value = ""; // El único dato manual
            openModal();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function addExercise() {
            const name = document.getElementById('ex-name').value;
            const weight = parseFloat(document.getElementById('ex-weight').value);
            const sets = Math.min(10, Math.max(1, parseInt(document.getElementById('ex-sets').value)));
            const reps = Math.min(30, Math.max(1, parseInt(document.getElementById('ex-reps').value)));
            
            // Guardar en rutinas si no existe o ha cambiado
            if(!state.routines[state.current.muscle]) state.routines[state.current.muscle] = [];
            const existingIdx = state.routines[state.current.muscle].findIndex(e => e.name.toLowerCase() === name.toLowerCase());
            
            const routineData = { name, sets, reps };
            if(existingIdx >= 0) {
                state.routines[state.current.muscle][existingIdx] = routineData;
            } else {
                state.routines[state.current.muscle].push(routineData);
            }
            save();
            renderSavedRoutines();

            if(!state.current.isStarted) {
                state.current.isStarted = true;
                sessionInt = setInterval(() => {
                    state.current.sessionSeconds++;
                    document.getElementById('session-timer').innerText = formatTime(state.current.sessionSeconds);
                }, 1000);
            }

            state.current.exercises.push({ 
                name, weight, sets, reps, 
                time: 0, isRunning: false, 
                totalVolume: weight * sets * reps 
            });

            document.getElementById('btn-finish').disabled = false;
            document.getElementById('btn-finish').classList.remove('opacity-50', 'cursor-not-allowed');
            renderExercises();
            closeModal();
            document.getElementById('exercise-form').reset();
        }

        function removeExFromCurrent(idx) {
            state.current.exercises.splice(idx, 1);
            if(state.current.exercises.length === 0) {
                document.getElementById('btn-finish').disabled = true;
                document.getElementById('btn-finish').classList.add('opacity-50', 'cursor-not-allowed');
            }
            renderExercises();
        }

        function toggleExTimer(idx) {
            const ex = state.current.exercises[idx];
            ex.isRunning = !ex.isRunning;
            state.current.exercises.forEach((item, i) => { if(i !== idx) item.isRunning = false; });
            clearInterval(exInt);
            if(ex.isRunning) {
                exInt = setInterval(() => {
                    ex.time++;
                    state.current.productiveSeconds++;
                    document.getElementById(`ex-timer-${idx}`).innerText = formatTime(ex.time);
                    document.getElementById('productive-timer').innerText = formatTime(state.current.productiveSeconds);
                }, 1000);
            }
            renderExercises();
        }

        function renderExercises() {
            const container = document.getElementById('exercise-list');
            container.innerHTML = state.current.exercises.map((ex, idx) => `
                <div class="glass-card p-4 rounded-2xl flex justify-between items-center ${ex.isRunning ? 'border-mint/40 bg-mint/5 shadow-[0_0_15px_rgba(45,212,191,0.05)]' : 'border-white/5'}">
                    <div class="flex items-center gap-3">
                        <button onclick="removeExFromCurrent(${idx})" class="w-8 h-8 rounded-xl bg-ruby/10 text-ruby text-xs font-black flex items-center justify-center hover:bg-ruby/20 transition-colors">✕</button>
                        <div>
                            <h4 class="text-[10px] font-black uppercase tracking-tight">${ex.name}</h4>
                            <span class="text-[8px] text-white/40 uppercase font-bold">${ex.weight}lb | ${ex.sets}x${ex.reps}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div id="ex-timer-${idx}" class="text-[10px] font-mono font-bold mb-1 text-white/60">${formatTime(ex.time)}</div>
                        <button onclick="toggleExTimer(${idx})" class="px-4 py-1.5 rounded-xl text-[8px] font-black uppercase tracking-widest ${ex.isRunning ? 'bg-ruby text-white' : 'bg-mint text-pine'} transition-all">
                            ${ex.isRunning ? 'Parar' : 'Activo'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function finishWorkout() {
            const workout = {
                id: Date.now(),
                date: new Date().toISOString(),
                muscle: state.current.muscle,
                totalTime: state.current.sessionSeconds,
                activeTime: state.current.productiveSeconds,
                totalVolume: state.current.exercises.reduce((acc, ex) => acc + ex.totalVolume, 0),
                exercises: [...state.current.exercises]
            };
            state.workouts.push(workout);
            state.xp += Math.floor(workout.totalVolume / 10) + Math.floor(workout.activeTime / 60);
            save();
            
            clearInterval(sessionInt); 
            clearInterval(exInt);
            state.current = { muscle: null, exercises: [], sessionSeconds: 0, productiveSeconds: 0, isStarted: false };
            
            document.getElementById('workout-area').classList.add('hidden');
            document.getElementById('session-timer').innerText = "00:00:00";
            document.getElementById('productive-timer').innerText = "00:00:00";
            document.querySelectorAll('#muscle-selector button').forEach(b => b.classList.remove('muscle-btn-active'));
            document.getElementById('btn-finish').disabled = true;
            document.getElementById('btn-finish').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('exercise-list').innerHTML = '';
            
            switchTab('history');
        }

        function deleteWorkout(id) {
            state.workouts = state.workouts.filter(w => w.id !== id);
            save();
            refreshUI();
        }

        function renderHistory() {
            const filtered = state.workouts.filter(w => {
                const d = new Date(w.date);
                return d.getMonth() === state.viewMonth && d.getFullYear() === state.viewYear;
            });
            const container = document.getElementById('history-container');
            if(filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-20 font-black uppercase text-[10px] tracking-[0.3em]">No hay registros este mes</div>`;
                return;
            }
            container.innerHTML = filtered.slice().reverse().map(w => `
                <div class="glass-card p-6 rounded-[2.5rem]">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[8px] font-black text-white/30 uppercase tracking-widest">${new Date(w.date).toLocaleDateString('es-ES', { day: 'numeric', month: 'long' })}</span>
                            <h3 class="text-2xl font-black italic uppercase tracking-tighter text-shadow-glow">${w.muscle}</h3>
                        </div>
                        <button onclick="deleteWorkout(${w.id})" class="px-3 py-1.5 rounded-xl bg-ruby/10 text-ruby text-[8px] font-black uppercase border border-ruby/10">Eliminar</button>
                    </div>
                    <div class="grid grid-cols-3 gap-3 mb-6">
                        <div class="text-center bg-white/5 p-3 rounded-2xl border border-white/5">
                            <span class="text-[7px] block text-white/20 uppercase font-black mb-1">Volumen</span>
                            <span class="text-xs font-bold">${w.totalVolume.toLocaleString()}lb</span>
                        </div>
                         <div class="text-center bg-white/5 p-3 rounded-2xl border border-white/5">
                            <span class="text-[7px] block text-white/20 uppercase font-black mb-1">Tiempo</span>
                            <span class="text-xs font-bold">${formatTime(w.totalTime)}</span>
                        </div>
                         <div class="text-center bg-white/5 p-3 rounded-2xl border border-mint/10">
                            <span class="text-[7px] block text-mint/30 uppercase font-black mb-1 text-shadow-glow">TBT</span>
                            <span class="text-xs font-bold text-mint">${formatTime(w.activeTime)}</span>
                        </div>
                    </div>
                    <div class="space-y-2 max-h-32 overflow-y-auto pr-2 no-scrollbar">
                        ${w.exercises.map(ex => `
                            <div class="flex justify-between text-[9px] font-bold border-b border-white/5 pb-2">
                                <span class="uppercase text-white/60">${ex.name}</span>
                                <span>${ex.weight}lb <span class="text-white/20">×</span> ${ex.sets}x${ex.reps}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderMetrics() {
            const filtered = state.workouts.filter(w => {
                const d = new Date(w.date);
                return d.getMonth() === state.viewMonth && d.getFullYear() === state.viewYear;
            });

            const cal = document.getElementById('calendar-container');
            cal.innerHTML = '';
            const daysInMonth = new Date(state.viewYear, state.viewMonth + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const dayDate = new Date(state.viewYear, state.viewMonth, i).toLocaleDateString();
                const workout = filtered.find(w => new Date(w.date).toLocaleDateString() === dayDate);
                cal.innerHTML += `<div class="calendar-day ${workout ? 'cal-'+workout.muscle : ''}"></div>`;
            }

            const ctx = document.getElementById('volumeChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            const volumeData = MUSCLES.map(m => {
                return filtered.filter(w => w.muscle === m).reduce((acc, w) => acc + w.totalVolume, 0);
            });

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: MUSCLES,
                    datasets: [{
                        data: volumeData,
                        backgroundColor: ['#f43f5e', '#0ea5e9', '#84cc16', '#f97316', '#a855f7', '#2dd4bf'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { display: false } }
                }
            });

            const freqContainer = document.getElementById('weekly-frequency');
            freqContainer.innerHTML = MUSCLES.map(m => {
                const count = filtered.filter(w => w.muscle === m).length;
                const percent = Math.min(100, (count / 4) * 100);
                return `
                    <div class="space-y-2">
                        <div class="flex justify-between text-[8px] font-black uppercase tracking-tighter">
                            <span>${m}</span>
                            <span class="text-mint">${count} <span class="text-white/20">sesiones</span></span>
                        </div>
                        <div class="h-2 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
                            <div class="h-full bg-gradient-to-r from-mint to-sky" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderAchievements() {
            const totalVolume = state.workouts.reduce((acc, w) => acc + w.totalVolume, 0);
            const totalTime = state.workouts.reduce((acc, w) => acc + w.totalTime, 0);
            const activeTime = state.workouts.reduce((acc, w) => acc + w.activeTime, 0);
            const monthlyWorkouts = state.workouts.filter(w => new Date(w.date).getMonth() === new Date().getMonth()).length;
            const uniqueMuscles = new Set(state.workouts.map(w => w.muscle)).size;

            let unlockedCount = 0;
            const container = document.getElementById('achievements-container');
            container.innerHTML = ACHIEVEMENTS.map(ach => {
                let current = 0;
                if(ach.type === 'count') current = state.workouts.length;
                else if(ach.type === 'volume') current = totalVolume;
                else if(ach.type === 'activeTime') current = activeTime;
                else if(ach.type === 'monthly') current = monthlyWorkouts;
                else if(ach.type.startsWith('muscle_')) {
                    const muscle = ach.type.split('_')[1];
                    current = state.workouts.filter(w => w.muscle === muscle).length;
                }
                else if(ach.type === 'single_volume') current = Math.max(0, ...state.workouts.map(w => w.totalVolume));
                else if(ach.type === 'single_time') current = Math.max(0, ...state.workouts.map(w => w.totalTime));
                else if(ach.type === 'single_ex_count') current = Math.max(0, ...state.workouts.map(w => w.exercises.length));
                else if(ach.type === 'all_muscles') current = uniqueMuscles;

                const isUnlocked = current >= ach.goal;
                if(isUnlocked) unlockedCount++;
                const progress = Math.min(100, (current / ach.goal) * 100);

                return `
                    <div class="achievement-card p-5 rounded-[2.5rem] flex flex-col items-center text-center relative overflow-hidden ${isUnlocked ? 'achievement-unlocked' : 'opacity-40'}">
                        <div class="w-16 h-16 rounded-full bg-gradient-to-br ${ach.color} flex items-center justify-center text-3xl shadow-lg mb-4 transform ${isUnlocked ? 'scale-110' : 'grayscale'}">
                            ${ach.icon}
                        </div>
                        <h4 class="text-[10px] font-black uppercase italic leading-tight mb-1">${ach.title}</h4>
                        <p class="text-[7px] text-white/40 uppercase font-bold mb-4 tracking-tighter">${ach.desc}</p>
                        
                        <div class="w-full space-y-1">
                            <div class="flex justify-between text-[6px] font-black text-white/20 uppercase">
                                <span>PROGRESO</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden border border-white/5">
                                <div class="h-full bg-gradient-to-r ${ach.color}" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        ${isUnlocked ? '<div class="absolute top-2 right-4 text-[8px] text-mint font-black">✔</div>' : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('ach-count').innerText = `${unlockedCount}/30 LOGROS`;
        }

        function refreshUI() {
            if(state.activeTab === 'metrics') renderMetrics();
            if(state.activeTab === 'history') renderHistory();
            if(state.activeTab === 'achievements') renderAchievements();
            save();
        }

        window.onload = () => {
            const sel = document.getElementById('muscle-selector');
            sel.innerHTML = MUSCLES.map(m => `<button onclick="selectMuscle('${m}')" id="btn-${m}" class="py-4 rounded-2xl bg-white/5 border border-white/5 text-[9px] font-black uppercase text-white/40 tracking-widest transition-all">${m}</button>`).join('');
            
            const yearSel = document.getElementById('year-select');
            for(let y=2024; y<=2030; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.text = y;
                if(y === state.viewYear) opt.selected = true;
                yearSel.add(opt);
            }

            document.getElementById('month-select').value = state.viewMonth;
            save();
            refreshUI();
        };
    </script>
</body>
</html>
