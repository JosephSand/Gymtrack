
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymTrack Pro | Entrenamiento & Logros</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pine: '#064e3b',
                        mint: '#2dd4bf',
                        dark: '#0a0a0a',
                        gold: '#fbbf24',
                        ruby: '#ef4444',
                        diamond: '#60a5fa',
                        emerald: '#10b981'
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-active {
            color: #2dd4bf;
            border-bottom: 3px solid #2dd4bf;
        }
        .accent-button {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            box-shadow: 0 10px 20px rgba(6, 78, 59, 0.3);
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            border-radius: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            position: relative;
        }
        .calendar-day:active { transform: scale(0.9); }
        .calendar-day.selected {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.1);
        }
        .calendar-day.has-workout {
            background: rgba(45, 212, 191, 0.15);
            color: #2dd4bf;
            font-weight: 800;
        }
        .calendar-header-day {
            font-size: 0.65rem;
            font-weight: 900;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            padding-bottom: 0.5rem;
        }
        .achievement-card {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .achievement-locked {
            filter: grayscale(1) opacity(0.3);
        }
        .achievement-unlocked {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        .glow-mint { box-shadow: 0 0 20px rgba(45, 212, 191, 0.3); border-color: rgba(45, 212, 191, 0.4) !important; }
        .glow-gold { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); border-color: rgba(251, 191, 36, 0.4) !important; }
        .glow-ruby { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.4) !important; }
        .glow-diamond { box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); border-color: rgba(96, 165, 250, 0.4) !important; }
        .glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); border-color: rgba(16, 185, 129, 0.4) !important; }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 pt-12 sticky top-0 bg-[#0a0a0a]/90 backdrop-blur-xl z-40 border-b border-white/5">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-pine flex items-center justify-center border border-mint/20 shadow-lg">
                        <svg class="w-6 h-6 text-mint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7h16M4 17h16M10 7v10M14 7v10" stroke-width="2.5" stroke-linecap="round"/></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Gym<span class="text-mint">Track</span></h1>
                        <p id="user-rank" class="text-[10px] font-bold text-mint/60 uppercase tracking-widest mt-1 italic">Cargando progreso...</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 flex items-center gap-2">
                        <span class="text-gold animate-pulse">★</span>
                        <span id="total-xp-header" class="text-sm font-black text-white">0</span>
                    </div>
                </div>
            </div>

            <nav class="flex gap-2 overflow-x-auto pb-1">
                <button onclick="switchTab('workout')" id="tab-workout" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest tab-active uppercase">Entrenar</button>
                <button onclick="switchTab('metrics')" id="tab-metrics" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Métricas</button>
                <button onclick="switchTab('achievements')" id="tab-achievements" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Logros</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Historial</button>
            </nav>
        </div>
    </header>

    <div class="max-w-xl mx-auto p-6">
        
        <!-- Tab: Workout -->
        <section id="content-workout" class="space-y-6">
            <div class="glass-card p-6 rounded-[2.5rem] flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="timer-dot" class="w-2.5 h-2.5 rounded-full bg-white/20"></div>
                    <span id="timer-display" class="text-3xl font-mono font-bold tracking-tighter">00:00</span>
                </div>
                <button id="btn-timer" onclick="toggleTimer()" class="px-6 py-3 rounded-2xl bg-mint text-pine font-black text-xs uppercase shadow-lg shadow-mint/20">Iniciar</button>
            </div>

            <div id="active-exercises" class="space-y-4"></div>

            <button onclick="openModal()" class="w-full py-6 rounded-[2.5rem] accent-button text-mint font-black text-sm uppercase tracking-widest transition-transform active:scale-95">
                + Añadir Ejercicio
            </button>

            <button id="btn-finish" onclick="finishWorkout()" class="hidden w-full py-6 rounded-[2.5rem] border-2 border-mint text-mint font-black text-sm uppercase tracking-widest">
                Finalizar Sesión (lb)
            </button>
        </section>

        <!-- Tab: Metrics -->
        <section id="content-metrics" class="hidden space-y-6">
            <div class="flex items-center justify-between glass-card p-3 rounded-3xl">
                <button onclick="changeMonth(-1)" class="p-2 text-mint">◀</button>
                <h3 id="calendar-month-year" class="text-[10px] font-black uppercase tracking-widest">Mes</h3>
                <button onclick="changeMonth(1)" class="p-2 text-mint">▶</button>
            </div>

            <div class="glass-card p-6 rounded-[2.5rem]">
                <div class="grid grid-cols-7 mb-2">
                    <div class="calendar-header-day">Lun</div>
                    <div class="calendar-header-day">Mar</div>
                    <div class="calendar-header-day">Mié</div>
                    <div class="calendar-header-day">Jue</div>
                    <div class="calendar-header-day">Vie</div>
                    <div class="calendar-header-day">Sáb</div>
                    <div class="calendar-header-day">Dom</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
            </div>

            <div id="day-details" class="hidden space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h4 class="text-[10px] font-black uppercase tracking-widest text-white/40">Sesiones del <span id="view-day-label" class="text-mint">día</span></h4>
                    <button onclick="openManualModal()" class="text-[10px] font-black uppercase text-mint bg-mint/10 px-3 py-1 rounded-full">+ Registro Manual</button>
                </div>
                <div id="day-workouts-list" class="space-y-2"></div>
            </div>

            <!-- Gráfica de Volumen (Radar) -->
            <div class="glass-card p-8 rounded-[3rem]">
                <h4 class="text-[10px] font-black uppercase tracking-widest text-white/30 mb-6 text-center italic">Volumen por Músculo (lb)</h4>
                <div class="relative h-[250px]">
                    <canvas id="muscleChart"></canvas>
                </div>
            </div>

            <!-- NUEVA: Gráfica de Frecuencia (Barras) -->
            <div class="glass-card p-8 rounded-[3rem]">
                <h4 class="text-[10px] font-black uppercase tracking-widest text-white/30 mb-6 text-center italic">Frecuencia de Entrenamiento (Veces)</h4>
                <div class="relative h-[200px]">
                    <canvas id="frequencyChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Tab: Achievements -->
        <section id="content-achievements" class="hidden space-y-6 pb-10">
            <div class="flex flex-col items-center justify-center py-4">
                <div id="achievements-count" class="text-[10px] font-black uppercase text-mint tracking-[0.2em] mb-2 italic">0 / 20 LOGROS DESBLOQUEADOS</div>
                <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="achievements-progress-bar" class="h-full bg-mint transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
            <div id="achievements-list" class="grid grid-cols-1 gap-4"></div>
        </section>

        <!-- Tab: History -->
        <section id="content-history" class="hidden space-y-4">
            <div id="history-list" class="space-y-4"></div>
        </section>

    </div>

    <!-- Modals -->
    <div id="modal-manual" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-[3rem] border-white/10">
            <h3 class="text-xl font-black uppercase italic mb-2">Registrar <span class="text-mint text-sm" id="manual-date-label">Día</span></h3>
            <div class="space-y-4 mt-6">
                <div>
                    <label class="text-[9px] font-black uppercase text-white/40 mb-2 block tracking-widest">Grupo Muscular</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectMuscleManual('Pecho')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Pecho</button>
                        <button onclick="selectMuscleManual('Espalda')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Espalda</button>
                        <button onclick="selectMuscleManual('Piernas')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Piernas</button>
                        <button onclick="selectMuscleManual('Hombros')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Hombros</button>
                        <button onclick="selectMuscleManual('Brazos')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Brazos</button>
                        <button onclick="selectMuscleManual('Core')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Core</button>
                        <button onclick="selectMuscleManual('Abdomen')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Abdomen</button>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-white/40 mb-2 block tracking-widest">Peso Total (lb)</label>
                    <input type="number" id="manual-weight-input" placeholder="Ej: 5000" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-mint text-white font-bold">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeManualModal()" class="flex-1 py-3 text-xs font-bold text-white/30 uppercase">Cerrar</button>
                <button onclick="confirmManualEntry()" class="flex-1 py-3 bg-mint rounded-2xl text-pine font-black text-xs uppercase">Guardar</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-[3rem] border-white/10">
            <h3 class="text-xl font-black uppercase italic mb-6">Nuevo <span class="text-mint">Reto</span></h3>
            <div class="space-y-4">
                <input type="text" id="input-ex-name" placeholder="Nombre del Ejercicio" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-mint text-white font-bold">
                <select id="input-ex-type" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white/60 font-bold">
                    <option value="Pecho">Pecho</option>
                    <option value="Espalda">Espalda</option>
                    <option value="Piernas">Piernas</option>
                    <option value="Hombros">Hombros</option>
                    <option value="Brazos">Brazos</option>
                    <option value="Core">Core</option>
                    <option value="Abdomen">Abdomen</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 text-xs font-bold text-white/30 uppercase">Cancelar</button>
                    <button onclick="handleAddExercise()" class="flex-1 py-3 bg-mint rounded-2xl text-pine font-black text-xs uppercase">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ACHIEVEMENTS_DEF = [
            { id: 'first_step', title: 'Primer Paso', desc: 'Completa 1 entrenamiento', target: 1, type: 'workouts', color: 'mint', icon: '🔥' },
            { id: 'consistency_3', title: 'Tridente', desc: 'Completa 3 entrenamientos', target: 3, type: 'workouts', color: 'emerald', icon: '🔱' },
            { id: 'gym_rat', title: 'Rata de Gimnasio', desc: 'Completa 10 entrenamientos', target: 10, type: 'workouts', color: 'ruby', icon: '🐀' },
            { id: 'warrior', title: 'Guerrero Eterno', desc: 'Completa 25 entrenamientos', target: 25, type: 'workouts', color: 'diamond', icon: '⚔️' },
            { id: 'vol_2k', title: 'Tonelada Corta', desc: '2,000lb en una sesión', target: 2000, type: 'volume_single', color: 'gold', icon: '⚖️' },
            { id: 'vol_5k', title: 'Fuerza Bruta', desc: '5,000lb en una sesión', target: 5000, type: 'volume_single', color: 'ruby', icon: '🔨' },
            { id: 'vol_10k', title: 'Leyenda de Hierro', desc: '10,000lb en una sesión', target: 10000, type: 'volume_single', color: 'diamond', icon: '👑' },
            { id: 'total_50k', title: 'Titán Novato', desc: '50,000lb acumuladas', target: 50000, type: 'total_volume', color: 'mint', icon: '⛰️' },
            { id: 'total_100k', title: 'Montaña de Músculo', desc: '100,000lb acumuladas', target: 100000, type: 'total_volume', color: 'gold', icon: '🏔️' },
            { id: 'chest_king', title: 'Pecho de Acero', desc: '5 sesiones de Pecho', target: 5, type: 'muscle_Pecho', color: 'mint', icon: '🛡️' },
            { id: 'back_beast', title: 'Espalda de Titán', desc: '5 sesiones de Espalda', target: 5, type: 'muscle_Espalda', color: 'emerald', icon: '🦅' },
            { id: 'leg_day_master', title: 'Pilar Inamovible', desc: '5 sesiones de Piernas', target: 5, type: 'muscle_Piernas', color: 'ruby', icon: '🦵' },
            { id: 'shoulder_boulder', title: 'Hombros de Piedra', desc: '5 sesiones de Hombros', target: 5, type: 'muscle_Hombros', color: 'gold', icon: '🗿' },
            { id: 'abs_warrior', title: 'Núcleo de Poder', desc: '5 sesiones de Abdomen', target: 5, type: 'muscle_Abdomen', color: 'diamond', icon: '💎' },
            { id: 'lvl_5', title: 'Prestigio I', desc: 'Alcanza el Nivel 5', target: 4000, type: 'total_xp', color: 'mint', icon: '⭐' },
            { id: 'lvl_10', title: 'Prestigio II', desc: 'Alcanza el Nivel 10', target: 9000, type: 'total_xp', color: 'gold', icon: '🌟' },
            { id: 'sets_100', title: 'Máquina de Repes', desc: '100 series completadas', target: 100, type: 'total_sets', color: 'emerald', icon: '⚡' },
            { id: 'time_marathon', title: 'Sesión Épica', desc: 'Entrena 90 min (una vez)', target: 5400, type: 'duration_single', color: 'ruby', icon: '⏱️' },
            { id: 'early_bird', title: 'Madrugador', desc: 'Entrena antes de las 9 AM', target: 1, type: 'early_train', color: 'gold', icon: '☀️' },
            { id: 'night_owl', title: 'Búho Nocturno', desc: 'Entrena después de las 10 PM', target: 1, type: 'late_train', color: 'diamond', icon: '🌙' }
        ];

        let state = JSON.parse(localStorage.getItem('gt_v11_state')) || {
            workouts: [],
            activeExercises: [],
            xp: 0,
            level: 1
        };

        let viewDate = new Date();
        let timer = { interval: null, seconds: 0, running: false };
        let volChart = null;
        let freqChart = null;
        let selectedManualDate = null;
        let selectedManualMuscle = null;

        function save() { localStorage.setItem('gt_v11_state', JSON.stringify(state)); }

        function switchTab(tabId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active', 'text-white/30');
                b.classList.add(b.id === `tab-${tabId}` ? 'tab-active' : 'text-white/30');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            if(tabId === 'metrics') renderMetrics();
            if(tabId === 'history') renderHistory();
            if(tabId === 'achievements') renderAchievements();
        }

        // --- CALENDARIO ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const label = document.getElementById('calendar-month-year');
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            grid.innerHTML = '';
            label.innerText = `${months[viewDate.getMonth()]} ${viewDate.getFullYear()}`;
            const firstDayIndex = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
            let offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;
            for(let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;
            for(let d = 1; d <= daysInMonth; d++) {
                const currentDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
                const dStr = currentDate.toISOString().split('T')[0];
                const ws = state.workouts.filter(w => w.date.startsWith(dStr));
                const el = document.createElement('div');
                el.className = `calendar-day ${ws.length > 0 ? 'has-workout' : 'text-white/20'} ${selectedManualDate === dStr ? 'selected' : ''}`;
                el.innerText = d;
                el.onclick = () => selectDay(dStr);
                grid.appendChild(el);
            }
        }

        function selectDay(dateStr) {
            selectedManualDate = dateStr;
            document.getElementById('view-day-label').innerText = dateStr;
            document.getElementById('day-details').classList.remove('hidden');
            renderCalendar();
            renderDayWorkouts();
        }

        function renderDayWorkouts() {
            const list = document.getElementById('day-workouts-list');
            const ws = state.workouts.filter(w => w.date.startsWith(selectedManualDate));
            if(ws.length === 0) { list.innerHTML = '<div class="p-8 text-[10px] text-white/10 uppercase font-black text-center italic border-2 border-dashed border-white/5 rounded-[2rem]">Sin registros</div>'; return; }
            list.innerHTML = ws.map(w => `
                <div class="glass-card p-5 rounded-2xl flex items-center justify-between">
                    <div>
                        <p class="text-[9px] font-black uppercase text-mint italic tracking-widest">${Object.keys(w.muscles).join(', ')}</p>
                        <p class="text-sm font-bold text-white mt-1">${w.vol.toLocaleString()} lb</p>
                    </div>
                    <button onclick="deleteWorkout(${w.id})" class="w-10 h-10 rounded-xl bg-ruby/10 flex items-center justify-center text-ruby">✕</button>
                </div>
            `).join('');
        }

        function deleteWorkout(id) {
            state.workouts = state.workouts.filter(w => w.id !== id);
            save(); renderMetrics(); updateHeader();
        }

        // --- REGISTRO MANUAL ---
        function openManualModal() {
            if(!selectedManualDate) selectedManualDate = new Date().toISOString().split('T')[0];
            document.getElementById('manual-date-label').innerText = selectedManualDate;
            document.getElementById('manual-weight-input').value = '';
            selectedManualMuscle = null;
            document.querySelectorAll('.muscle-opt').forEach(opt => {
                opt.classList.remove('bg-mint', 'text-pine', 'border-mint');
                opt.classList.add('bg-white/5', 'text-white', 'border-white/5');
            });
            document.getElementById('modal-manual').classList.remove('hidden');
        }
        function closeManualModal() { document.getElementById('modal-manual').classList.add('hidden'); }
        function selectMuscleManual(muscle) {
            selectedManualMuscle = muscle;
            document.querySelectorAll('.muscle-opt').forEach(opt => {
                const isActive = opt.innerText === muscle.toUpperCase();
                opt.classList.toggle('bg-mint', isActive);
                opt.classList.toggle('text-pine', isActive);
                opt.classList.toggle('border-mint', isActive);
                opt.classList.toggle('bg-white/5', !isActive);
                opt.classList.toggle('text-white', !isActive);
                opt.classList.toggle('border-white/5', !isActive);
            });
        }
        function confirmManualEntry() {
            const weight = parseFloat(document.getElementById('manual-weight-input').value);
            if(!selectedManualDate || !selectedManualMuscle || !weight) return;
            state.workouts.unshift({
                id: Date.now(),
                date: selectedManualDate + "T12:00:00.000Z",
                muscles: { [selectedManualMuscle]: weight },
                vol: weight,
                setsCount: 3,
                duration: 1800,
                manual: true
            });
            state.xp += 100;
            save(); renderMetrics(); updateHeader(); closeManualModal(); renderDayWorkouts();
        }

        // --- GRÁFICAS ---
        function renderCharts() {
            const labels = ['Pecho', 'Espalda', 'Piernas', 'Hombros', 'Brazos', 'Core', 'Abdomen'];
            const monthly = state.workouts.filter(w => {
                const d = new Date(w.date);
                return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear();
            });

            // Datos Volumen
            const volData = labels.map(l => monthly.reduce((acc, w) => acc + (w.muscles[l] || 0), 0));
            // Datos Frecuencia
            const freqData = labels.map(l => monthly.filter(w => w.muscles[l]).length);

            // Radar Volumen
            const ctxV = document.getElementById('muscleChart').getContext('2d');
            if(volChart) volChart.destroy();
            volChart = new Chart(ctxV, {
                type: 'radar',
                data: {
                    labels,
                    datasets: [{
                        data: volData,
                        borderColor: '#2dd4bf',
                        backgroundColor: 'rgba(45, 212, 191, 0.1)',
                        pointBackgroundColor: '#2dd4bf'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: 'rgba(255,255,255,0.4)', font: { size: 9, weight: 'bold' } }, ticks: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });

            // Barras Frecuencia
            const ctxF = document.getElementById('frequencyChart').getContext('2d');
            if(freqChart) freqChart.destroy();
            freqChart = new Chart(ctxF, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        data: freqData,
                        backgroundColor: 'rgba(45, 212, 191, 0.4)',
                        borderColor: '#2dd4bf',
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 8, weight: 'bold' } } },
                        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 8 }, stepSize: 1 } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // --- WORKOUT LOGIC ---
        function handleAddExercise() {
            const name = document.getElementById('input-ex-name').value;
            const type = document.getElementById('input-ex-type').value;
            if(!name) return;
            state.activeExercises.push({ id: Date.now(), name, type, sets: [{ id: Date.now()+1, weight: '', reps: '', done: false }] });
            renderWorkout(); closeModal();
            document.getElementById('input-ex-name').value = '';
        }
        function renderWorkout() {
            const container = document.getElementById('active-exercises');
            container.innerHTML = state.activeExercises.map(ex => `
                <div class="glass-card rounded-[2.5rem] overflow-hidden">
                    <div class="p-5 bg-white/5 flex justify-between items-center">
                        <div>
                            <h4 class="text-sm font-black uppercase italic">${ex.name}</h4>
                            <span class="text-[8px] font-bold text-mint uppercase tracking-widest">${ex.type}</span>
                        </div>
                        <button onclick="removeEx(${ex.id})" class="text-white/20 hover:text-ruby">✕</button>
                    </div>
                    <div class="p-6 space-y-3">
                        ${ex.sets.map((s, i) => `
                            <div class="flex gap-2 items-center">
                                <span class="w-6 text-[10px] font-black text-white/20">${i+1}</span>
                                <input type="number" value="${s.weight}" placeholder="lb" onchange="updateSet(${ex.id}, ${s.id}, 'weight', this.value)" class="flex-1 bg-white/5 border border-white/5 rounded-xl p-3 text-center text-xs font-bold outline-none focus:border-mint">
                                <input type="number" value="${s.reps}" placeholder="reps" onchange="updateSet(${ex.id}, ${s.id}, 'reps', this.value)" class="flex-1 bg-white/5 border border-white/5 rounded-xl p-3 text-center text-xs font-bold outline-none focus:border-mint">
                                <button onclick="toggleSet(${ex.id}, ${s.id})" class="w-10 h-10 rounded-xl flex items-center justify-center ${s.done ? 'bg-mint text-pine' : 'bg-white/5 text-white/20'} transition-all">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round"/></svg>
                                </button>
                            </div>
                        `).join('')}
                        <button onclick="addSet(${ex.id})" class="w-full py-2 text-[8px] font-bold text-white/10 uppercase tracking-widest">+ Añadir Serie</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('btn-finish').classList.toggle('hidden', state.activeExercises.length === 0);
        }
        function removeEx(id) { state.activeExercises = state.activeExercises.filter(e => e.id !== id); renderWorkout(); save(); }
        function addSet(exId) { state.activeExercises.find(e => e.id === exId).sets.push({ id: Date.now(), weight: '', reps: '', done: false }); renderWorkout(); save(); }
        function updateSet(exId, setId, key, val) { const ex = state.activeExercises.find(e => e.id === exId); const set = ex.sets.find(s => s.id === setId); set[key] = parseFloat(val); save(); }
        function toggleSet(exId, setId) {
            const ex = state.activeExercises.find(e => e.id === exId);
            const set = ex.sets.find(s => s.id === setId);
            set.done = !set.done;
            if(set.done) state.xp += 25;
            save(); renderWorkout(); updateHeader();
        }
        function finishWorkout() {
            const completed = state.activeExercises.filter(ex => ex.sets.some(s => s.done));
            if(completed.length === 0) return;
            let musclesMap = {}; let vol = 0; let setsCount = 0;
            completed.forEach(ex => {
                let exVol = 0;
                ex.sets.forEach(s => { if(s.done) { exVol += (s.weight * s.reps || 0); setsCount++; }});
                musclesMap[ex.type] = (musclesMap[ex.type] || 0) + exVol;
                vol += exVol;
            });
            state.workouts.unshift({ id: Date.now(), date: new Date().toISOString(), muscles: musclesMap, vol, setsCount, duration: timer.seconds });
            state.activeExercises = [];
            state.xp += 150;
            resetTimer(); save(); switchTab('metrics'); updateHeader();
        }

        // --- UI & UPDATES ---
        function renderAchievements() {
            const container = document.getElementById('achievements-list');
            let unlockedCount = 0;
            const html = ACHIEVEMENTS_DEF.map(ach => {
                const prog = calculateProgress(ach);
                const isUnlocked = prog.current >= ach.target;
                if(isUnlocked) unlockedCount++;
                const percent = Math.min(100, (prog.current / ach.target) * 100);
                const colorHex = { mint: '#2dd4bf', gold: '#fbbf24', ruby: '#ef4444', diamond: '#60a5fa', emerald: '#10b981' }[ach.color];
                return `
                    <div class="glass-card p-5 rounded-[2rem] achievement-card ${isUnlocked ? 'achievement-unlocked glow-'+ach.color : 'achievement-locked'}">
                        <div class="flex items-center gap-4">
                            <div class="text-3xl filter drop-shadow-lg">${ach.icon}</div>
                            <div class="flex-1 min-w-0">
                                <h4 class="text-xs font-black uppercase italic ${isUnlocked ? 'text-white' : 'text-white/40'} truncate">${ach.title}</h4>
                                <p class="text-[9px] text-white/30 font-bold uppercase tracking-tight mt-0.5">${ach.desc}</p>
                                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mt-3"><div class="h-full" style="width: ${percent}%; background-color: ${colorHex}"></div></div>
                                <div class="flex justify-between mt-2"><span class="text-[8px] font-black uppercase text-white/30">${Math.floor(prog.current).toLocaleString()} / ${ach.target.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            container.innerHTML = html;
            document.getElementById('achievements-count').innerText = `${unlockedCount} / 20 LOGROS DESBLOQUEADOS`;
            document.getElementById('achievements-progress-bar').style.width = `${(unlockedCount / 20) * 100}%`;
        }

        function calculateProgress(ach) {
            let current = 0;
            switch(ach.type) {
                case 'workouts': current = state.workouts.length; break;
                case 'total_xp': current = state.xp; break;
                case 'total_volume': current = state.workouts.reduce((acc, w) => acc + w.vol, 0); break;
                case 'total_sets': current = state.workouts.reduce((acc, w) => acc + w.setsCount, 0); break;
                case 'volume_single': current = state.workouts.length ? Math.max(...state.workouts.map(w => w.vol)) : 0; break;
                case 'duration_single': current = state.workouts.length ? Math.max(...state.workouts.map(w => w.duration)) : 0; break;
                case 'early_train': current = state.workouts.some(w => new Date(w.date).getHours() < 9 && !w.manual) ? 1 : 0; break;
                case 'late_train': current = state.workouts.some(w => new Date(w.date).getHours() >= 22 && !w.manual) ? 1 : 0; break;
                default: if(ach.type.startsWith('muscle_')) current = state.workouts.filter(w => w.muscles[ach.type.replace('muscle_', '')]).length;
            }
            return { current };
        }

        function toggleTimer() {
            if(timer.running) { clearInterval(timer.interval); document.getElementById('btn-timer').innerText = 'Reanudar'; }
            else { timer.interval = setInterval(() => { timer.seconds++; updateTimerUI(); }, 1000); document.getElementById('btn-timer').innerText = 'Pausar'; document.getElementById('timer-dot').classList.add('bg-mint', 'animate-pulse'); }
            timer.running = !timer.running;
        }
        function resetTimer() { clearInterval(timer.interval); timer.seconds = 0; timer.running = false; updateTimerUI(); document.getElementById('btn-timer').innerText = 'Iniciar'; }
        function updateTimerUI() { const m = Math.floor(timer.seconds / 60); const s = timer.seconds % 60; document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if(state.workouts.length === 0) { container.innerHTML = '<div class="text-center py-20 text-white/20 text-xs italic font-black uppercase">Sin historial</div>'; return; }
            container.innerHTML = state.workouts.map(w => `
                <div class="glass-card p-6 rounded-[2rem]">
                    <span class="text-[10px] font-black text-mint uppercase tracking-widest">${new Date(w.date).toLocaleDateString()}</span>
                    <h4 class="text-xs font-black uppercase italic mt-1">${Object.keys(w.muscles).join(', ')}</h4>
                    <p class="text-sm font-black mt-2">${w.vol.toLocaleString()} lb</p>
                </div>`).join('');
        }

        function updateHeader() {
            document.getElementById('total-xp-header').innerText = state.xp.toLocaleString();
            state.level = Math.floor(state.xp / 1000) + 1;
            document.getElementById('user-rank').innerText = `Nivel ${state.level} · Atleta de Hierro`;
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function renderMetrics() { renderCalendar(); renderCharts(); if(selectedManualDate) renderDayWorkouts(); }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderMetrics(); }

        updateHeader();
        renderWorkout();
    </script>
</body>
</html>
