
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GymTrack Pro | Entrenamiento & Logros</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pine: '#064e3b',
                        mint: '#2dd4bf',
                        dark: '#0a0a0a',
                        gold: '#fbbf24',
                        ruby: '#ef4444',
                        diamond: '#60a5fa',
                        emerald: '#10b981'
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .tab-active {
            color: #2dd4bf;
            border-bottom: 3px solid #2dd4bf;
        }
        .accent-button {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
            box-shadow: 0 10px 20px rgba(6, 78, 59, 0.3);
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .calendar-day:active { transform: scale(0.9); }
        .calendar-day.selected {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.05);
        }
        .calendar-day.has-workout {
            background: rgba(45, 212, 191, 0.1);
            color: #2dd4bf;
            font-weight: 800;
            border: 1px solid rgba(45, 212, 191, 0.2);
        }
        .achievement-card {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .achievement-locked {
            filter: grayscale(1) opacity(0.3);
        }
        .achievement-unlocked {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }
        .glow-mint { box-shadow: 0 0 20px rgba(45, 212, 191, 0.3); border-color: rgba(45, 212, 191, 0.4) !important; }
        .glow-gold { box-shadow: 0 0 20px rgba(251, 191, 36, 0.3); border-color: rgba(251, 191, 36, 0.4) !important; }
        .glow-ruby { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: rgba(239, 68, 68, 0.4) !important; }
        .glow-diamond { box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); border-color: rgba(96, 165, 250, 0.4) !important; }
        .glow-emerald { box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); border-color: rgba(16, 185, 129, 0.4) !important; }
        
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-6 pt-12 sticky top-0 bg-[#0a0a0a]/90 backdrop-blur-xl z-40 border-b border-white/5">
        <div class="max-w-xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-pine flex items-center justify-center border border-mint/20 shadow-lg">
                        <svg class="w-6 h-6 text-mint" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 7h16M4 17h16M10 7v10M14 7v10" stroke-width="2.5" stroke-linecap="round"/></svg>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">Gym<span class="text-mint">Track</span></h1>
                        <p id="user-rank" class="text-[10px] font-bold text-mint/60 uppercase tracking-widest mt-1 italic">Cargando progreso...</p>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="px-4 py-2 rounded-xl bg-white/5 border border-white/10 flex items-center gap-2">
                        <span class="text-gold animate-pulse">★</span>
                        <span id="total-xp-header" class="text-sm font-black text-white">0</span>
                    </div>
                </div>
            </div>

            <nav class="flex gap-2 overflow-x-auto pb-1">
                <button onclick="switchTab('workout')" id="tab-workout" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest tab-active uppercase">Entrenar</button>
                <button onclick="switchTab('metrics')" id="tab-metrics" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Métricas</button>
                <button onclick="switchTab('achievements')" id="tab-achievements" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Logros</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-none px-4 pb-3 text-[11px] font-black tracking-widest text-white/30 uppercase">Historial</button>
            </nav>
        </div>
    </header>

    <div class="max-w-xl mx-auto p-6">
        
        <!-- Tab: Workout -->
        <section id="content-workout" class="space-y-6">
            <div class="glass-card p-6 rounded-[2.5rem] flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div id="timer-dot" class="w-2.5 h-2.5 rounded-full bg-white/20"></div>
                    <span id="timer-display" class="text-3xl font-mono font-bold tracking-tighter">00:00</span>
                </div>
                <button id="btn-timer" onclick="toggleTimer()" class="px-6 py-3 rounded-2xl bg-mint text-pine font-black text-xs uppercase shadow-lg shadow-mint/20">Iniciar</button>
            </div>

            <div id="active-exercises" class="space-y-4"></div>

            <button onclick="openModal()" class="w-full py-6 rounded-[2.5rem] accent-button text-mint font-black text-sm uppercase tracking-widest transition-transform active:scale-95">
                + Añadir Ejercicio
            </button>

            <button id="btn-finish" onclick="finishWorkout()" class="hidden w-full py-6 rounded-[2.5rem] border-2 border-mint text-mint font-black text-sm uppercase tracking-widest">
                Finalizar Sesión
            </button>
        </section>

        <!-- Tab: Metrics -->
        <section id="content-metrics" class="hidden space-y-6">
            <div class="flex items-center justify-between glass-card p-3 rounded-3xl">
                <button onclick="changeMonth(-1)" class="p-2 text-mint">◀</button>
                <h3 id="calendar-month-year" class="text-[10px] font-black uppercase tracking-widest">Mes</h3>
                <button onclick="changeMonth(1)" class="p-2 text-mint">▶</button>
            </div>

            <div class="glass-card p-6 rounded-[2.5rem]">
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>

            <!-- Listado de entrenamientos del día seleccionado -->
            <div id="day-details" class="hidden space-y-4">
                <div class="flex items-center justify-between px-2">
                    <h4 class="text-[10px] font-black uppercase tracking-widest text-white/40">Sesiones del <span id="view-day-label" class="text-mint">día</span></h4>
                    <button onclick="openManualModal()" class="text-[10px] font-black uppercase text-mint bg-mint/10 px-3 py-1 rounded-full">+ Añadir</button>
                </div>
                <div id="day-workouts-list" class="space-y-2"></div>
            </div>

            <div class="glass-card p-8 rounded-[3rem]">
                <div class="relative h-[250px]">
                    <canvas id="muscleChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Tab: Achievements -->
        <section id="content-achievements" class="hidden space-y-6 pb-10">
            <div id="achievements-list" class="space-y-4"></div>
        </section>

        <!-- Tab: History -->
        <section id="content-history" class="hidden space-y-4">
            <div id="history-list" class="space-y-4"></div>
        </section>

    </div>

    <!-- Modal Registro Manual (Métricas) -->
    <div id="modal-manual" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-[3rem] border-white/10">
            <h3 class="text-xl font-black uppercase italic mb-2">Registrar <span class="text-mint text-sm" id="manual-date-label">Día</span></h3>
            
            <div class="space-y-4 mt-6">
                <div>
                    <label class="text-[9px] font-black uppercase text-white/40 mb-2 block tracking-widest">Grupo Muscular</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="selectMuscleManual('Pecho')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Pecho</button>
                        <button onclick="selectMuscleManual('Espalda')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Espalda</button>
                        <button onclick="selectMuscleManual('Piernas')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Piernas</button>
                        <button onclick="selectMuscleManual('Hombros')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Hombros</button>
                        <button onclick="selectMuscleManual('Brazos')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Brazos</button>
                        <button onclick="selectMuscleManual('Core')" class="muscle-opt py-3 rounded-xl bg-white/5 border border-white/5 text-[9px] font-black uppercase">Core</button>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black uppercase text-white/40 mb-2 block tracking-widest">Peso Total (kg)</label>
                    <input type="number" id="manual-weight-input" placeholder="Ej: 2500" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-mint text-white font-bold">
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeManualModal()" class="flex-1 py-3 text-xs font-bold text-white/30 uppercase">Cerrar</button>
                <button onclick="confirmManualEntry()" class="flex-1 py-3 bg-mint rounded-2xl text-pine font-black text-xs uppercase">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Ejercicio Estándar -->
    <div id="modal" class="fixed inset-0 z-[100] bg-black/95 hidden flex items-center justify-center p-6">
        <div class="glass-card w-full max-w-sm p-8 rounded-[3rem] border-white/10">
            <h3 class="text-xl font-black uppercase italic mb-6">Nuevo <span class="text-mint">Reto</span></h3>
            <div class="space-y-4">
                <input type="text" id="input-ex-name" placeholder="Nombre del Ejercicio" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none focus:border-mint text-white font-bold">
                <select id="input-ex-type" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 outline-none text-white/60 font-bold">
                    <option value="Pecho">Pecho</option>
                    <option value="Espalda">Espalda</option>
                    <option value="Piernas">Piernas</option>
                    <option value="Hombros">Hombros</option>
                    <option value="Brazos">Brazos</option>
                    <option value="Core">Core</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-3 text-xs font-bold text-white/30 uppercase">Cancelar</button>
                    <button onclick="handleAddExercise()" class="flex-1 py-3 bg-mint rounded-2xl text-pine font-black text-xs uppercase">Añadir</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ACHIEVEMENTS_DEF = [
            { id: 'first_step', title: 'Primer Paso', desc: 'Completa tu primer entrenamiento', target: 1, type: 'workouts', color: 'mint', icon: '🔥' },
            { id: 'consistency_3', title: 'Tridente', desc: 'Entrena 3 veces en una semana', target: 3, type: 'weekly', color: 'emerald', icon: '🔱' },
            { id: 'volume_1000', title: 'Tonelada', desc: 'Mueve 1,000kg en una sesión', target: 1000, type: 'volume_single', color: 'gold', icon: '⚖️' },
            { id: 'volume_10000', title: 'Titán de Hierro', desc: 'Mueve 10,000kg totales', target: 10000, type: 'total_volume', color: 'ruby', icon: '⚒️' },
            { id: 'sets_50', title: 'Máquina de Repes', desc: 'Completa 50 series totales', target: 50, type: 'total_sets', color: 'diamond', icon: '⚡' },
            { id: 'chest_king', title: 'Pecho de Acero', desc: '10 ejercicios de Pecho', target: 10, type: 'muscle_Pecho', color: 'mint', icon: '🛡️' },
            { id: 'leg_day', title: 'Pilar Inamovible', desc: '10 ejercicios de Piernas', target: 10, type: 'muscle_Piernas', color: 'emerald', icon: '🦵' },
            { id: 'xp_5000', title: 'Prestigio V', desc: 'Alcanza 5,000 XP', target: 5000, type: 'total_xp', color: 'mint', icon: '⭐' },
            { id: 'marathon', title: 'Maratón de Hierro', desc: 'Entrena por más de 90 min', target: 5400, type: 'duration', color: 'emerald', icon: '⏱️' },
            { id: 'diversity', title: 'Cuerpo Completo', desc: 'Entrena todos los grupos musculares', target: 6, type: 'all_muscles', color: 'gold', icon: '🧬' }
        ];

        let state = JSON.parse(localStorage.getItem('gt_v8_state')) || {
            workouts: [],
            activeExercises: [],
            xp: 0,
            level: 1,
            startDate: new Date().toISOString()
        };

        let viewDate = new Date();
        let timer = { interval: null, seconds: 0, running: false };
        let chartInstance = null;
        let selectedManualDate = null;
        let selectedManualMuscle = null;

        function save() { localStorage.setItem('gt_v8_state', JSON.stringify(state)); }

        function switchTab(tabId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => {
                b.classList.remove('tab-active');
                b.classList.add('text-white/30');
            });
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');
            document.getElementById(`tab-${tabId}`).classList.remove('text-white/30');

            if(tabId === 'metrics') renderMetrics();
            if(tabId === 'history') renderHistory();
            if(tabId === 'achievements') renderAchievements();
        }

        // --- CALENDARIO Y GESTIÓN DE DÍAS ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const label = document.getElementById('calendar-month-year');
            const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            
            grid.innerHTML = '';
            label.innerText = `${months[viewDate.getMonth()]} ${viewDate.getFullYear()}`;

            const first = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getDay();
            const days = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0).getDate();
            let offset = first === 0 ? 6 : first - 1;

            for(let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            for(let d = 1; d <= days; d++) {
                const currentDate = new Date(viewDate.getFullYear(), viewDate.getMonth(), d);
                const dStr = currentDate.toISOString().split('T')[0];
                const ws = state.workouts.filter(w => w.date.startsWith(dStr));
                
                const el = document.createElement('div');
                el.className = `calendar-day ${ws.length > 0 ? 'has-workout' : 'text-white/10'} ${selectedManualDate === dStr ? 'selected' : ''}`;
                el.innerText = d;
                el.onclick = () => selectDay(dStr);
                grid.appendChild(el);
            }
        }

        function selectDay(dateStr) {
            selectedManualDate = dateStr;
            document.getElementById('view-day-label').innerText = dateStr;
            document.getElementById('day-details').classList.remove('hidden');
            renderCalendar(); // Refrescar para mostrar borde de selección
            renderDayWorkouts();
        }

        function renderDayWorkouts() {
            const list = document.getElementById('day-workouts-list');
            const ws = state.workouts.filter(w => w.date.startsWith(selectedManualDate));
            
            if(ws.length === 0) {
                list.innerHTML = '<div class="p-4 text-[10px] text-white/20 uppercase font-black text-center italic">Sin actividad este día</div>';
                return;
            }

            list.innerHTML = ws.map(w => {
                const muscle = Object.keys(w.muscles)[0] || 'Gral';
                return `
                    <div class="glass-card p-4 rounded-2xl flex items-center justify-between">
                        <div>
                            <p class="text-[10px] font-black uppercase text-mint italic">${muscle}</p>
                            <p class="text-xs font-bold">${w.vol.toLocaleString()}kg <span class="text-white/20 text-[8px] uppercase">movidos</span></p>
                        </div>
                        <button onclick="deleteWorkout(${w.id})" class="p-2 text-ruby/40 hover:text-ruby">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function deleteWorkout(id) {
            // Confirmación suave simulada (puedes añadir modal de confirmación si prefieres)
            state.workouts = state.workouts.filter(w => w.id !== id);
            save();
            renderDayWorkouts();
            renderCalendar();
            renderChart();
            updateHeader();
        }

        function openManualModal() {
            if(!selectedManualDate) {
                const today = new Date().toISOString().split('T')[0];
                selectedManualDate = today;
                document.getElementById('view-day-label').innerText = today;
            }
            document.getElementById('manual-date-label').innerText = selectedManualDate;
            document.getElementById('manual-weight-input').value = '';
            selectedManualMuscle = null;
            document.querySelectorAll('.muscle-opt').forEach(opt => {
                opt.classList.remove('bg-mint', 'text-pine', 'border-mint');
                opt.classList.add('bg-white/5', 'text-white', 'border-white/5');
            });
            document.getElementById('modal-manual').classList.remove('hidden');
        }

        function closeManualModal() {
            document.getElementById('modal-manual').classList.add('hidden');
        }

        function selectMuscleManual(muscle) {
            selectedManualMuscle = muscle;
            document.querySelectorAll('.muscle-opt').forEach(opt => {
                if(opt.innerText === muscle.toUpperCase()) {
                    opt.classList.add('bg-mint', 'text-pine', 'border-mint');
                    opt.classList.remove('bg-white/5', 'text-white', 'border-white/5');
                } else {
                    opt.classList.remove('bg-mint', 'text-pine', 'border-mint');
                    opt.classList.add('bg-white/5', 'text-white', 'border-white/5');
                }
            });
        }

        function confirmManualEntry() {
            const weight = parseFloat(document.getElementById('manual-weight-input').value);
            if(!selectedManualDate || !selectedManualMuscle || !weight) return;

            state.workouts.unshift({
                id: Date.now(),
                date: selectedManualDate + "T12:00:00.000Z",
                muscles: { [selectedManualMuscle]: weight },
                vol: weight,
                setsCount: 3,
                duration: 1800,
                manual: true
            });

            state.xp += 100;
            save();
            renderMetrics();
            updateHeader();
            closeManualModal();
            renderDayWorkouts();
        }

        // --- GRÁFICO ---
        function renderChart() {
            const ctx = document.getElementById('muscleChart').getContext('2d');
            const labels = ['Pecho', 'Espalda', 'Piernas', 'Hombros', 'Brazos', 'Core'];
            const monthly = state.workouts.filter(w => {
                const d = new Date(w.date);
                return d.getMonth() === viewDate.getMonth() && d.getFullYear() === viewDate.getFullYear();
            });
            const data = labels.map(l => monthly.reduce((acc, w) => acc + (w.muscles[l] || 0), 0));

            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels,
                    datasets: [{
                        data,
                        borderColor: '#2dd4bf',
                        backgroundColor: 'rgba(45, 212, 191, 0.1)',
                        pointBackgroundColor: '#2dd4bf'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: 'rgba(255,255,255,0.4)', font: { size: 10, weight: 'bold' } }, ticks: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // --- SISTEMA ENTRENAMIENTO ---
        function handleAddExercise() {
            const name = document.getElementById('input-ex-name').value;
            const type = document.getElementById('input-ex-type').value;
            if(!name) return;
            state.activeExercises.push({
                id: Date.now(),
                name,
                type,
                sets: [{ id: Date.now()+1, weight: '', reps: '', done: false }]
            });
            renderWorkout();
            closeModal();
            document.getElementById('input-ex-name').value = '';
        }

        function renderWorkout() {
            const container = document.getElementById('active-exercises');
            container.innerHTML = state.activeExercises.map(ex => `
                <div class="glass-card rounded-[2.5rem] overflow-hidden">
                    <div class="p-5 bg-white/5 flex justify-between items-center">
                        <div>
                            <h4 class="text-sm font-black uppercase italic">${ex.name}</h4>
                            <span class="text-[8px] font-bold text-mint uppercase tracking-widest">${ex.type}</span>
                        </div>
                        <button onclick="removeEx(${ex.id})" class="text-white/20">✕</button>
                    </div>
                    <div class="p-6 space-y-3">
                        ${ex.sets.map((s, i) => `
                            <div class="flex gap-2 items-center">
                                <span class="w-6 text-[10px] font-black text-white/20">${i+1}</span>
                                <input type="number" value="${s.weight}" placeholder="kg" onchange="updateSet(${ex.id}, ${s.id}, 'weight', this.value)" class="flex-1 bg-white/5 border border-white/5 rounded-xl p-3 text-center text-xs font-bold outline-none">
                                <input type="number" value="${s.reps}" placeholder="reps" onchange="updateSet(${ex.id}, ${s.id}, 'reps', this.value)" class="flex-1 bg-white/5 border border-white/5 rounded-xl p-3 text-center text-xs font-bold outline-none">
                                <button onclick="toggleSet(${ex.id}, ${s.id})" class="w-10 h-10 rounded-xl flex items-center justify-center ${s.done ? 'bg-mint text-pine' : 'bg-white/5 text-white/20'}">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-width="3" stroke-linecap="round"/></svg>
                                </button>
                            </div>
                        `).join('')}
                        <button onclick="addSet(${ex.id})" class="w-full py-2 text-[8px] font-bold text-white/10 uppercase tracking-widest">+ Serie</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('btn-finish').classList.toggle('hidden', state.activeExercises.length === 0);
        }

        function removeEx(id) { state.activeExercises = state.activeExercises.filter(e => e.id !== id); renderWorkout(); save(); }
        function addSet(exId) { state.activeExercises.find(e => e.id === exId).sets.push({ id: Date.now(), weight: '', reps: '', done: false }); renderWorkout(); save(); }
        function updateSet(exId, setId, key, val) { const ex = state.activeExercises.find(e => e.id === exId); const set = ex.sets.find(s => s.id === setId); set[key] = parseFloat(val); save(); }
        function toggleSet(exId, setId) {
            const ex = state.activeExercises.find(e => e.id === exId);
            const set = ex.sets.find(s => s.id === setId);
            set.done = !set.done;
            if(set.done) state.xp += 25;
            save(); renderWorkout(); updateHeader();
        }

        function finishWorkout() {
            const completed = state.activeExercises.filter(ex => ex.sets.some(s => s.done));
            if(completed.length === 0) return;
            let musclesMap = {}; let vol = 0; let setsCount = 0;
            completed.forEach(ex => {
                let exVol = 0;
                ex.sets.forEach(s => { if(s.done) { exVol += (s.weight * s.reps || 0); setsCount++; }});
                musclesMap[ex.type] = (musclesMap[ex.type] || 0) + exVol;
                vol += exVol;
            });
            state.workouts.unshift({ id: Date.now(), date: new Date().toISOString(), muscles: musclesMap, vol, setsCount, duration: timer.seconds });
            state.activeExercises = [];
            state.xp += 150;
            resetTimer(); save(); switchTab('metrics'); updateHeader();
        }

        // --- OTROS COMPONENTES ---
        function renderAchievements() {
            const container = document.getElementById('achievements-list');
            container.innerHTML = ACHIEVEMENTS_DEF.map(ach => {
                const prog = calculateProgress(ach);
                const isUnlocked = prog.current >= ach.target;
                const percent = Math.min(100, (prog.current / ach.target) * 100);
                const glowClass = isUnlocked ? `glow-${ach.color}` : '';
                const colorHex = { mint: '#2dd4bf', gold: '#fbbf24', ruby: '#ef4444', diamond: '#60a5fa', emerald: '#10b981' }[ach.color];
                return `
                    <div class="glass-card p-6 rounded-[2.5rem] achievement-card ${isUnlocked ? 'achievement-unlocked ' + glowClass : 'achievement-locked'}">
                        <div class="flex items-center gap-5">
                            <div class="text-4xl filter drop-shadow-lg">${ach.icon}</div>
                            <div class="flex-1">
                                <h4 class="text-sm font-black uppercase italic ${isUnlocked ? 'text-white' : 'text-white/40'}">${ach.title}</h4>
                                <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden mt-3">
                                    <div class="h-full transition-all duration-1000" style="width: ${percent}%; background-color: ${colorHex}"></div>
                                </div>
                                <div class="flex justify-between mt-2"><span class="text-[8px] font-black uppercase text-white/30">${Math.floor(prog.current).toLocaleString()} / ${ach.target.toLocaleString()}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function calculateProgress(ach) {
            let current = 0;
            switch(ach.type) {
                case 'workouts': current = state.workouts.length; break;
                case 'total_xp': current = state.xp; break;
                case 'total_volume': current = state.workouts.reduce((acc, w) => acc + w.vol, 0); break;
                case 'total_sets': current = state.workouts.reduce((acc, w) => acc + w.setsCount, 0); break;
                case 'volume_single': current = state.workouts.length ? Math.max(...state.workouts.map(w => w.vol)) : 0; break;
                default: if(ach.type.startsWith('muscle_')) { current = state.workouts.filter(w => w.muscles[ach.type.replace('muscle_', '')]).length; }
            }
            return { current };
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            if(state.workouts.length === 0) { container.innerHTML = '<div class="text-center py-10 text-white/20 text-xs font-bold uppercase tracking-widest">Sin registros aún</div>'; return; }
            container.innerHTML = state.workouts.map(w => {
                const d = new Date(w.date);
                return `
                    <div class="glass-card p-6 rounded-[2rem]">
                        <div class="flex justify-between items-start mb-2"><span class="text-[10px] font-black text-mint uppercase tracking-widest">${d.toLocaleDateString()}</span></div>
                        <h4 class="text-xs font-black uppercase italic">${Object.keys(w.muscles).join(', ')}</h4>
                        <p class="text-xs font-black mt-2">${w.vol.toLocaleString()}kg</p>
                    </div>
                `;
            }).join('');
        }

        function toggleTimer() {
            if(timer.running) { clearInterval(timer.interval); document.getElementById('btn-timer').innerText = 'Reanudar'; }
            else { timer.interval = setInterval(() => { timer.seconds++; updateTimerUI(); }, 1000); document.getElementById('btn-timer').innerText = 'Pausar'; document.getElementById('timer-dot').classList.add('bg-mint', 'animate-pulse'); }
            timer.running = !timer.running;
        }

        function resetTimer() { clearInterval(timer.interval); timer.seconds = 0; timer.running = false; updateTimerUI(); document.getElementById('btn-timer').innerText = 'Iniciar'; }
        function updateTimerUI() { const m = Math.floor(timer.seconds / 60); const s = timer.seconds % 60; document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }

        function updateHeader() {
            document.getElementById('total-xp-header').innerText = state.xp.toLocaleString();
            state.level = Math.floor(state.xp / 1000) + 1;
            document.getElementById('user-rank').innerText = `Nivel ${state.level} · Atleta`;
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function renderMetrics() { renderCalendar(); renderChart(); if(selectedManualDate) renderDayWorkouts(); }
        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); renderMetrics(); }

        updateHeader();
        renderWorkout();
    </script>
</body>
</html>
